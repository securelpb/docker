# --------------------------------------------------------
# SERVER 1: JupyterLab Environment (Main)
# --------------------------------------------------------
server {
    listen 8888;
    server_name _;

    client_max_body_size 2G;

    location / {
        proxy_pass http://jupyterlab:8888;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --------------------------------------------------------
# SERVER 2: JupyterLab PyTorch Environment
# --------------------------------------------------------
server {
    listen 8889;
    server_name _;

    client_max_body_size 2G;

    location / {
        proxy_pass http://jupyterlab-pytorch:8888; # The container itself still runs on 8888
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --------------------------------------------------------
# SERVER 3: TensorBoard
# --------------------------------------------------------
server {
    listen 6006;
    server_name _;

    location / {
        proxy_pass http://tensorboard:6006; # Updated to point to the tensorboard service
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support for TensorBoard
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
