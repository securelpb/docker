services:
  jupyterlab:
    build:
      context: ./jupyterlab
      dockerfile: Dockerfile
    container_name: jupyterlab
    hostname: jupyterlab
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - /home/alex/src/jupyter_work:/home/jovyan # Main workspace
      - /mnt/gdrive:/home/jovyan/gdrive          # Google Drive nested mount
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - PYTHONPATH=/home/jovyan/jupyterlab:${PYTHONPATH}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nginx:
    image: nginx:alpine
    container_name: nginx
    hostname: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8888:8888" # Exposes Nginx on host port 8888
    depends_on:
      - jupyterlab